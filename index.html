<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Horror Maze</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        /* 💡 スマホのブラウザやWebViewで画面を完全に固定する最強の設定 */
        html, body {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'DotGothic16', sans-serif;
            overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        #hud-container {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            text-shadow: 1px 1px 2px #000; pointer-events: none;
        }
        #hud-container p { margin: 2px 0; font-size: 16px; }
        
        #minimap-container {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            border: 1px solid #555; background: #000; pointer-events: none;
        }

        /* 💡 ダイアログを基準に、その上にボタンを配置する */
        #dialogue-window {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 600px; height: 90px;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #ccc; border-radius: 8px;
            display: flex; align-items: center; padding: 5px; box-sizing: border-box;
            z-index: 20; pointer-events: auto;
        }
        #pokemon-face-img {
            width: 80px; height: 80px; object-fit: contain;
            border: 1px solid #555; background: #111; margin-right: 10px;
        }
        #pokemon-text {
            flex: 1; font-size: 16px; line-height: 1.4; word-wrap: break-word;
        }

        /* 💡 HTML側にボタンを直接配置（ダイアログの上の位置） */
        #stone-btn {
            position: absolute; bottom: 115px; left: 10px; /* 15(下余白)+90(顔窓)+10(隙間) = 115px */
            padding: 12px 18px; background: #003366; color: #00ffff;
            border: 2px solid #00ffff; font-family: 'DotGothic16', sans-serif; font-size: 16px;
            font-weight: bold; border-radius: 6px; cursor: pointer;
            text-shadow: 0 0 5px #00ffff; z-index: 20; pointer-events: auto; min-width: 80px; text-align: center;
        }

        #auto-btn {
            position: absolute; bottom: 115px; right: 10px;
            padding: 8px 12px; background: #222; color: #aaa; border: 1px solid #555;
            border-radius: 4px; font-family: 'DotGothic16', sans-serif; font-size: 14px;
            z-index: 20; cursor: pointer; pointer-events: auto;
        }
        #auto-btn.active { background: #004400; color: #0f0; border-color: #0f0; }

        #scare-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 99999;
        }
        #scare-img { max-width: 90%; max-height: 90%; display: none; }
        #scare-img.show { display: block; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        
        <div id="hud-container">
            <p id="steps">STEPS: 000000</p>
            <p id="battery-hud">⚡LIGHT: 100%</p>
            <p id="mental-hud">❤️MENTAL: 100%</p>
        </div>

        <div id="minimap-container">
            <canvas id="minimapCanvas" width="120" height="120"></canvas>
        </div>

        <button id="stone-btn">透明化</button>
        <button id="auto-btn">LIVE: OFF</button>

        <div id="dialogue-window">
            <img id="pokemon-face-img" src="assets/faces/3.png" alt="face">
            <div id="pokemon-text">うわ、真っ暗……。ここどこだよ、早く帰りたいんだけど……。</div>
        </div>

        <div id="scare-overlay">
            <img id="scare-img" src="" alt="scare">
        </div>
    </div>
    <script src="game_v3.js"></script>
    <script src="dialogues.js"></script>    
    <script src="enemies.js"></script>
    <script src="camera.js"></script>
</body>

</html>
