<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro 3D Maze Streamer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        
        /* HUDディスプレイ */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; font-family: monospace; font-size: 14px; color: #fff; text-shadow: 1px 1px 2px #000; line-height: 1.5; }
        .hud-line { margin-bottom: 4px; }
        
        /* 右上のミニマップ */
        #minimap-container { position: absolute; top: 10px; right: 10px; z-index: 100; border: 2px solid #333; background: #000; width: 100px; height: 100px; }
        #minimapCanvas { width: 100%; height: 100%; display: block; }

        /* オートプレイボタン */
        #auto-btn { position: absolute; bottom: 130px; right: 10px; z-index: 100; padding: 8px 12px; background: #222; color: #fff; border: 1px solid #55px; font-size: 12px; cursor: pointer; border-radius: 4px; }
        #auto-btn.active { background: #600; color: #ff0; border-color: #f00; }

        /* ホラー演出用オーバーレイ */
        #scare-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #scare-img { max-width: 80%; max-height: 80%; display: block; transform: scale(0.5); transition: transform 0.2s ease-out; }
        #scare-img.show { transform: scale(1.1); }

        /* 👧 配信風ダイアログウィンドウ（最前面・文字生成エリア） */
        #dialogue-window { position: absolute; bottom: 10px; left: 10px; right: 10px; height: 100px; background: rgba(0, 0, 0, 0.8); border: 3px double #777; border-radius: 6px; padding: 10px; display: flex; align-items: center; z-index: 2000; pointer-events: none; }
        #face-box { width: 80px; height: 80px; border: 1px solid #444; background: #111; display: flex; justify-content: center; align-items: center; margin-right: 12px; flex-shrink: 0; }
        #pokemon-face-img { width: 100%; height: 100%; object-fit: contain; }
        #text-box { flex-grow: 1; height: 100%; color: #fff; font-size: 14px; line-height: 1.4; overflow: hidden; font-family: sans-serif; }
        #pokemon-text { width: 100%; height: 100%; white-space: normal; word-break: break-all; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="hud-line">STEPS: <span id="steps">000000</span></div>
            <div class="hud-line" id="battery-hud">⚡LIGHT: 100%</div>
            <div class="hud-line" id="mental-hud">❤️MENTAL: 100%</div>
        </div>

        <div id="minimap-container">
            <canvas id="minimapCanvas" width="100" height="100"></canvas>
        </div>

        <button id="auto-btn">LIVE: OFF</button>

        <div id="scare-overlay">
            <img id="scare-img" src="assets/scares/1.png" alt="SCARE">
        </div>

        <div id="dialogue-window">
            <div id="face-box">
                <img id="pokemon-face-img" src="assets/faces/3.png" alt="face">
            </div>
            <div id="text-box">
                <div id="pokemon-text"></div>
            </div>
        </div>
    </div>

    <!-- 追加位置の例 -->
    <script src="enemies.js"></script>
    <script src="game_v3.js"></script>
    <script src="dialogues.js"></script>
    <script src="camera.js"></script>

</body>
</html>
